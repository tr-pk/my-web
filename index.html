<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youtube clone</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: Roboto, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .auth-box { text-align: center; background: #212121; padding: 40px; border-radius: 8px; border: 1px solid #3d3d3d; }
        #header { width: 100%; padding: 15px; display: flex; justify-content: center; position: sticky; top: 0; background: #0f0f0f; z-index: 100; border-bottom: 1px solid #3d3d3d; }
        .search-container { display: flex; width: 100%; max-width: 600px; }
        input { flex: 1; padding: 12px; border-radius: 40px 0 0 40px; border: 1px solid #3d3d3d; background: #121212; color: white; outline: none; font-size: 16px; padding-left: 20px; }
        button { padding: 10px 25px; border-radius: 0 40px 40px 0; border: 1px solid #3d3d3d; background: #3d3d3d; color: white; cursor: pointer; }
        
        /* メインレイアウト：左に動画再生、右に検索結果 */
        #main-content { display: flex; flex-direction: column; width: 95%; max-width: 1400px; padding-top: 20px; }
        #player-container { width: 100%; aspect-ratio: 16 / 9; background: black; border-radius: 12px; overflow: hidden; display: none; margin-bottom: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; }
        .video-card { cursor: pointer; }
        .video-card img { width: 100%; border-radius: 12px; transition: 0.2s; }
        .video-card:hover img { border-radius: 0; }
        .video-title { font-weight: bold; font-size: 14px; margin-top: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { font-size: 12px; color: #aaaaaa; margin-top: 4px; }
    </style>
</head>
<body>
<button id="theme-toggle" onclick="toggleTheme()" 
    style="position: fixed; top: 10px; right: 10px; z-index: 10000; border-radius: 40px; cursor: pointer; padding: 10px 15px; background: #333; color: white; border: 1px solid #555;">
    🌓 モード切替
</button>
    <div id="auth-overlay">
        <div class="auth-box">
            <h2>アクセス認証</h2>
            <input type="password" id="pass-input" placeholder="Password" onkeydown="if(event.key==='Enter') checkPass()">
            <button onclick="checkPass()">Unlock</button>
        </div>
    </div>

    <div id="header">
        <div class="search-container">
            <input type="text" id="search-query" placeholder="検索" onkeydown="if(event.key==='Enter') searchVideos()">
            <button onclick="searchVideos()">検索</button>
            <button class="history-btn" onclick="showHistory()">履歴</button>
        </div>
    </div>

    <div id="main-content">
        <div id="player-container">
            <iframe id="main-player" src="" allowfullscreen></iframe>
        </div>
        
        <div id="video-grid"></div>
    </div>

    <script>
        const API_KEY ='AIzaSyCfwer55eBILdt86ZOiG3EA1c9aHwU-3yA';

        function checkPass() {
    const input = document.getElementById('pass-input').value;
    if (input === '1213') {
        document.getElementById('auth-overlay').style.display = 'none';
    } else {
        //「システムエラー」を装う
        alert("404 Not Found\n要求されたリソースは、このサーバーで見つかりませんでした。");
        document.getElementById('pass-input').value = ''; 
    }
}

        async function searchVideos() {
            const query = document.getElementById('search-query').value;
            if (!query) return;
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            displayVideos(data.items);            
}

// --- 2. モード切替関数 ---
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('theme-toggle');

    if (!body || !btn) return;

    if (body.classList.contains('light-mode')) {
        body.classList.remove('light-mode');
        body.style.backgroundColor = "#0f0f0f";
        body.style.color = "white";
        btn.innerText = "☀️ ライトモードへ";
        btn.style.background = "#333";
        btn.style.color = "white";
    } else {
        body.classList.add('light-mode');
        body.style.backgroundColor = "white";
        body.style.color = "#0f0f0f";
        btn.innerText = "🌙 ダークモードへ";
        btn.style.background = "#eee";
        btn.style.color = "#333";
    }
} 
        function displayVideos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => {
    // 1. まず履歴に刻む
    saveToHistory(video.snippet.title, video.id.videoId); 
    // 2. その後に再生する！
    playVideo(video.id.videoId);
};
                card.innerHTML = `
                    <img src="${video.snippet.thumbnails.medium.url}">
                    <div class="video-title">${video.snippet.title}</div>
                    <div class="video-meta">${video.snippet.channelTitle}</div>
                `;
                grid.appendChild(card);
            });
        }

        function playVideo(videoId) {
            const container = document.getElementById('player-container');
            const player = document.getElementById('main-player');
            player.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1`;
            container.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        // --- 履歴保存エンジン ---
function saveToHistory(title, videoId) {
    // 1. ブラウザの「隠し引き出し（localStorage）」から今の履歴を出す
    let history = JSON.parse(localStorage.getItem('ytHistory')) || [];
    
    // 2. 「重複」を消して、最新を一番上にする
    history = history.filter(item => item.id !== videoId);
    history.unshift({ title: title, id: videoId });
    
    // 3. 10件溜まったら古いものから消す
    if (history.length > 10) history.pop();
    
    // 4. 引き出しに戻す！
    localStorage.setItem('ytHistory', JSON.stringify(history));
    
    console.log("履歴に保存:", title);
}
function showHistory() {
    // 1. 保存された履歴を取得（なければ空っぽ）
    const history = JSON.parse(localStorage.getItem('ytHistory')) || [];
    
    if (history.length === 0) {
        alert("履歴がありません。動画を再生してください。");
        return;
    }

    // 2. 履歴データをYouTubeの検索結果と同じ「形」に変換する
    // ぶっちゃけ、こうすることで既存の表示機能を100%使い回せるんですよね
    const historyData = history.map(item => ({
        id: { videoId: item.id },
        snippet: { 
            title: item.title,
            thumbnails: { medium: { url: `https://img.youtube.com/vi/${item.id}/mqdefault.jpg` } },
            channelTitle: "閲覧済み"
        }
    }));

    // 3.「displayVideos」を呼び出して表示！
    displayVideos(historyData);
}
    </script>
</body>
</html>
